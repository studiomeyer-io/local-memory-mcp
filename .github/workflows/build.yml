name: Build .mcpb Bundle

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    name: Build .mcpb (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Install and build
        run: |
          npm install
          npm run build

      - name: Pack bundle (bash)
        if: matrix.os != 'windows-latest'
        working-directory: mcpb
        run: bash pack.sh

      - name: Pack bundle (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: mcpb
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path "build/server" -Force | Out-Null
          Copy-Item manifest.json build/manifest.json
          Copy-Item -Recurse ../dist build/server/dist
          @'
          {
            "name": "local-memory-server",
            "version": "1.0.1",
            "private": true,
            "type": "module",
            "main": "dist/server.js",
            "dependencies": {
              "@modelcontextprotocol/sdk": "^1.29.0",
              "better-sqlite3": "^11.7.0",
              "zod": "^3.23.8"
            }
          }
          '@ | Set-Content build/server/package.json
          Push-Location build/server
          npm install --omit=dev --no-audit --no-fund
          Pop-Location
          mcpb validate build/manifest.json
          mcpb pack build local-memory-Windows.mcpb

      - name: Rename bundle
        if: matrix.os != 'windows-latest'
        working-directory: mcpb
        run: mv local-memory.mcpb local-memory-${{ matrix.platform }}.mcpb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpb-${{ matrix.platform }}
          path: mcpb/local-memory-*.mcpb
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [bundle]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -name '*.mcpb' -exec cp {} release/ \;
          ls -lh release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
