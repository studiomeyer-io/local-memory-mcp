name: Build .mcpb Bundle

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    name: Build .mcpb (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac-arm64
            os: macos-latest
            bun_target: darwin-arm64
          - platform: mac-x64
            os: macos-13
            bun_target: darwin-x64
          - platform: windows
            os: windows-latest
            bun_target: windows-x64
          - platform: linux
            os: ubuntu-latest
            bun_target: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build standalone binary
        shell: bash
        run: |
          # Install dependencies (MCP SDK, Zod)
          bun install

          # Swap to bun:sqlite client
          cp src/db/client-bun.ts src/db/client.ts

          # Compile standalone binary (embeds Bun runtime + bun:sqlite)
          mkdir -p mcpb/build/server
          bun build src/server.ts --compile --outfile mcpb/build/server/local-memory

          # Restore original client for git cleanliness
          git checkout src/db/client.ts

      - name: Write manifest
        shell: bash
        run: |
          cat > mcpb/build/manifest.json <<'EOF'
          {
            "manifest_version": "0.2",
            "name": "local-memory",
            "display_name": "Local Memory",
            "version": "1.0.1",
            "description": "Persistent local memory for Claude. 100% local, SQLite-based, zero API keys.",
            "long_description": "Local Memory gives Claude a persistent memory across conversations. Sessions, learnings, decisions, and a knowledge graph -- all stored in a single SQLite file on your machine. No cloud, no account, no telemetry. 13 tools.",
            "author": { "name": "StudioMeyer", "email": "hello@studiomeyer.io", "url": "https://studiomeyer.io" },
            "homepage": "https://github.com/studiomeyer-io/local-memory-mcp",
            "license": "MIT",
            "server": { "type": "binary", "entry_point": "server/local-memory" },
            "tools": [
              { "name": "memory_session_start", "description": "Start a session and load previous context" },
              { "name": "memory_session_end", "description": "End the current session with a summary" },
              { "name": "memory_learn", "description": "Store a learning with duplicate detection" },
              { "name": "memory_recall", "description": "Quick recall of learnings" },
              { "name": "memory_search", "description": "Unified FTS5 search across everything" },
              { "name": "memory_decide", "description": "Log a decision with reasoning" },
              { "name": "memory_entity_observe", "description": "Record a fact about an entity" },
              { "name": "memory_entity_search", "description": "Fuzzy search the knowledge graph" },
              { "name": "memory_entity_open", "description": "Load entity with observations and relations" },
              { "name": "memory_entity_relate", "description": "Create a typed relation between entities" },
              { "name": "memory_insights", "description": "Memory stats and reflection" },
              { "name": "memory_profile", "description": "Read or write a user profile field" },
              { "name": "memory_guide", "description": "On-demand help for any topic" }
            ],
            "compatibility": { "platforms": ["darwin", "win32", "linux"] }
          }
          EOF

      - name: Pack .mcpb
        shell: bash
        run: |
          cd mcpb/build
          zip -r ../local-memory-${{ matrix.platform }}.mcpb manifest.json server/
          ls -lh ../local-memory-${{ matrix.platform }}.mcpb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpb-${{ matrix.platform }}
          path: mcpb/local-memory-${{ matrix.platform }}.mcpb
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [bundle]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -name '*.mcpb' -exec cp {} release/ \;
          ls -lh release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
