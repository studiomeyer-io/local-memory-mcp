name: Build .mcpb Bundle

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    name: Build .mcpb (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac-arm64
            os: macos-latest
            bun_target: darwin-arm64
          - platform: mac-x64
            os: macos-13
            bun_target: darwin-x64
          - platform: windows
            os: windows-latest
            bun_target: windows-x64
          - platform: linux
            os: ubuntu-latest
            bun_target: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build standalone binary
        shell: bash
        run: |
          # Install dependencies (MCP SDK, Zod)
          bun install

          # Swap to bun:sqlite client
          cp src/db/client-bun.ts src/db/client.ts

          # Compile standalone binary (embeds Bun runtime + bun:sqlite)
          mkdir -p mcpb/build/server
          bun build src/server.ts --compile --outfile mcpb/build/server/local-memory

          # Restore original client for git cleanliness
          git checkout src/db/client.ts

      - name: Copy manifest
        shell: bash
        run: cp mcpb/manifest.json mcpb/build/manifest.json

      - name: Pack .mcpb
        shell: bash
        run: |
          cd mcpb/build
          zip -r ../local-memory-${{ matrix.platform }}.mcpb manifest.json server/
          ls -lh ../local-memory-${{ matrix.platform }}.mcpb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpb-${{ matrix.platform }}
          path: mcpb/local-memory-${{ matrix.platform }}.mcpb
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [bundle]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -name '*.mcpb' -exec cp {} release/ \;
          ls -lh release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
