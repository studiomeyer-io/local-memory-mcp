name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20', '22', '24']
      fail-fast: false
    env:
      # Mock embeddings: deterministic 384-dim vectors derived from token hashes
      # so we can exercise the hybrid-search path without pulling the 120 MB
      # multilingual-e5-small model into every CI run.
      MEMORY_EMBED_MOCK: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
